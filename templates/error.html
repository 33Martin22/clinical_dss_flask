{% extends "base.html" %}
{% block title %}Error {{ code }} — ClinicalAI DSS{% endblock %}
{% block content %}
<div style="text-align:center;padding:120px 20px">
  <div style="font-family:'DM Mono',monospace;font-size:72px;color:var(--border);margin-bottom:16px">{{ code }}</div>
  <h2 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px">{{ message }}</h2>
  <p style="color:var(--text-muted);margin-bottom:28px">Something went wrong. Please try again.</p>
  <a href="{{ url_for('landing') }}" class="btn btn-primary">← Back to Home</a>
</div>
{% endblock %}
