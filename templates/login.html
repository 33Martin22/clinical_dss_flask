{% extends "base.html" %}
{% block title %}Sign In — ClinicalAI DSS{% endblock %}
{% block public_content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your ClinicalAI account</div>

    {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Sign In →</button>
    </form>

    <div class="auth-divider">— or —</div>
    <p style="text-align:center;font-size:14px;color:var(--text-muted)">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="auth-link">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
